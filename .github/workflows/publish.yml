name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"

      - name: Build package
        # --no-isolation: build with the hash-pinned setuptools installed above
        # instead of downloading the backend fresh and unpinned at publish time.
        run: |
          pip install --require-hashes -r requirements-ci.txt
          python -m build --no-isolation

      - name: Audit wheel for supply chain attacks
        run: python scripts/audit_wheel.py

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1  # Docker action — SHA pins don't resolve for container images
        with:
          attestations: true
