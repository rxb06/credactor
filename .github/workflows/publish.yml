name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"

      - name: Build package
        # --no-isolation: build with the hash-pinned setuptools installed above
        # instead of downloading the backend fresh and unpinned at publish time.
        run: |
          pip install --require-hashes -r requirements-ci.txt
          python -m build --no-isolation

      - name: Verify version matches release tag
        # The published wheel's version is the PEP 440 normalization of
        # credactor.__version__ (pyproject dynamic attr; single-sourced, no
        # setup.py). Compare with packaging.Version — not raw strings — so a
        # non-canonical tag/version form (e.g. tag v2.5.0-beta <-> wheel 2.5.0b0)
        # can neither publish a mis-versioned, immutable PyPI artifact nor
        # false-fail a correct release. packaging is installed by Build above;
        # the quoted heredoc keeps the tag out of the shell (read via os.environ).
        run: |
          python - <<'PY'
          import os, sys
          from packaging.version import Version
          import credactor
          tag = os.environ['GITHUB_REF_NAME']
          pkg = credactor.__version__
          if Version(pkg) != Version(tag):
              sys.exit(f'::error::package version {pkg} does not match release tag {tag}')
          print(f'version OK: package {pkg} matches release tag {tag}')
          PY

      - name: Audit wheel for supply chain attacks
        run: python scripts/audit_wheel.py

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          attestations: true
